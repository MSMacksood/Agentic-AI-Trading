name: Build and deploy Python project to Azure Function App - trading-bot-v3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies locally for Azure
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Zip everything (Forces inclusion of hidden .python_packages folder)
        shell: bash
        run: |
          zip -r package.zip . -x "*.git*" -x "*venv*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_017B87985BCF477FA5B38646E53E321F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA3E2BEEDA5548C3865DB9249D731F4F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_56E380FA4F484B88B0E5BF2081829DDB }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'trading-bot-v3'
          slot-name: 'Production'
          package: 'package.zip'
